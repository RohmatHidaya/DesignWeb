<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>
    function displayBiodata() {
      var fields = ["nama", "npm", "prodi"];
      var output = "<h2>Biodata Mahasiswa</h2>";
      fields.forEach(function (field) {
        output +=
          "<p>" + field + " : " + document.getElementById(field).value + "</p>";
      });
      document.getElementById("output").innerHTML = output;
    }
  </script>
  <body>
    <form
      onsubmit="
        event.preventDefault();
        displayBiodata();
      "
    >
      <label for="nama">nama</label>
      <input type="text" name="name" id="nama" required /><br />
      <label for="">npm</label>
      <input type="text" id="npm" required /><br />
      <label for="prodi">prodi</label>
      <input type="text" id="prodi" required />
      <button type="submit">submit</button>
    </form>

    <div id="output" style="margin-top: 20px"></div>
  </body>
</html>
